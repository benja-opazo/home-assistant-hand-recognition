name: Hand Recognition
description: Detects and classifies hand gestures from Frigate camera snapshots using MediaPipe.
version: "0.1.3"
slug: hand_recognition
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:hand-wave
panel_title: Hand Recognition
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Web UI for configuration
options:
  mqtt_host: homeassistant.local
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  frigate_url: http://homeassistant.local:5000
  score_threshold: 0.7
  output_topic_template: "hand-recognition/{camera}"
  web_ui_port: 8099
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  frigate_url: str
  score_threshold: float
  output_topic_template: str
  web_ui_port: int
