mqtt_host: homeassistant.local
mqtt_port: 1883
mqtt_username: ""
mqtt_password: ""
frigate_url: http://homeassistant.local:5000
frigate_snapshot_mode: "event"
output_topic_template: "hand-recognition/{camera}"
web_ui_port: 8099
max_snapshots: 10
mediapipe_min_detection_confidence: 0.5
mediapipe_max_num_hands: 2
mediapipe_model_complexity: 1
enabled_gestures:
  - fist
  - thumbs_up
  - pointing
  - peace
  - open_palm
  - four_fingers
  - rock_on
  - call_me
  - pinky
  - three_fingers
mqtt_topic: "frigate/events"
topic_filters:
  - property: "type"
    comparator: "=="
    value: "update"
  - property: "after.label"
    comparator: "=="
    value: "person"
  - property: "after.top_score"
    comparator: ">"
    value: "0.7"
